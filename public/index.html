<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / App Meta -->
    <meta name="theme-color" content="#1a2a3a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BelegFix" />
    <meta name="application-name" content="BelegFix" />
    <meta name="description" content="BelegFix – Belege, Rechnungen & G&V für Österreich" />

    <!-- Favicon & Icons -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Splash Screen Farbe (iOS) -->
    <meta name="msapplication-TileColor" content="#1a2a3a" />
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/logo192.png" />

    <!-- Schriften -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <title>BelegFix</title>

    <style>
      /* Verhindert Scroll-Bounce auf iOS */
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      /* Safe-Area für iPhone-Notch */
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <noscript>JavaScript muss aktiviert sein.</noscript>
    <div id="root"></div>
  </body>
</html>
